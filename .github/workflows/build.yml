name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild -project PerfBooster.xcodeproj -scheme PerfBooster -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO build

      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/PerfBooster.app Payload/
          zip -r PerfBooster.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PerfBooster-ipa
          path: PerfBooster.ipa
