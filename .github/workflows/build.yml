name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build app
        run: |
          swift build -c release

      - name: Package as IPA
        run: |
          mkdir -p Payload/PerfBooster.app
          cp .build/release/PerfBooster Payload/PerfBooster.app/PerfBooster
          cd Payload
          zip -r ../PerfBooster.ipa PerfBooster.app

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PerfBooster-ipa
          path: PerfBooster.ipa
